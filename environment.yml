name: agent-rag-demo-py310
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - sqlite
  - pip:
      # Base compatibility
      - typing-extensions==4.12.2
      - numpy==1.26.4
      - scipy==1.13.1

      # CPU torch
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.5.1+cpu

      # Web/API
      - fastapi==0.115.8
      - "uvicorn[standard]==0.34.3"
      - streamlit==1.41.1
      - pydantic==2.10.6
      - pydantic-settings==2.7.1
      - python-dotenv==1.0.1
      - python-multipart==0.0.20

      # Agent
      - langgraph==1.1.0
      - langgraph-checkpoint-sqlite==3.1.0
      - langgraph-checkpoint-postgres==3.1.0
      - "langchain-core>=1.3.3,<1.4.0"
      - langchain-protocol==0.0.10
      - "openai>=1.59.9,<2.0.0"
      - "tenacity>=8.5.0,<10.0.0"

      # RAG
      - sentence-transformers==3.3.1
      - transformers==4.48.3
      - faiss-cpu==1.9.0.post1
      - rank-bm25==0.2.2
      - pypdf==5.1.0
      - python-docx==1.1.2
      - pandas==2.2.3
      - openpyxl==3.1.5
      - beautifulsoup4==4.12.3
      - markdown==3.7

      # DB
      - sqlalchemy==2.0.36
      - "psycopg[binary,pool]==3.3.4"

      # Eval/Trace
      - pytest==8.3.4
      - jsonlines==4.0.0
      - loguru==0.7.3
      - rich==13.9.4
      - scikit-learn==1.5.2
      - tqdm==4.67.1

      # Security/Auth
      - "python-jose[cryptography]==3.3.0"
      - cryptography==44.0.3
      - "passlib[bcrypt]==1.7.4"
      - bcrypt==4.2.1
